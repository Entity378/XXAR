name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: true
        default: 'SRAR'
        type: choice
        options:
          - ZZAR
          - SRAR

permissions:
  contents: write

env:
  # On tag push: repo name determines target (ZZAR repo → ZZAR, SRAR repo → SRAR)
  # On manual run: use the dropdown input
  BUILD_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.event.repository.name == 'SRAR' && 'SRAR' || 'ZZAR') }}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libxcb-xinerama0 libxkbcommon-x11-0 libgl1 \
            libxcb-icccm4 libxcb-render-util0 libxcb-keysyms1 \
            libxcb-shape0 libxcb-image0 libpulse-mainloop-glib0 \
            qtwayland5 libwayland-dev libwayland-egl1 \
            qml-module-qtgraphicaleffects libqt5svg5 \
            flatpak flatpak-builder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build with PyInstaller (Flatpak mode)
        run: |
          export ${BUILD_TARGET}_FLATPAK_BUILD=1
          pyinstaller --clean ${BUILD_TARGET}.spec

      - name: Verify PyInstaller Build
        run: |
          if [ ! -e dist/${BUILD_TARGET} ]; then
            echo "Error: dist/${BUILD_TARGET} not found. Check your spec file output name."
            exit 1
          fi
          chmod +x dist/${BUILD_TARGET}

      - name: Set up Flatpak
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: |
          APP_ID=$(grep '^id:' flatpak/io.github.pucas01.${BUILD_TARGET}.yml | awk '{print $2}')
          flatpak-builder --force-clean --repo=flatpak-repo build-dir flatpak/io.github.pucas01.${BUILD_TARGET}.yml

      - name: Export Flatpak Bundle
        run: |
          APP_ID=$(grep '^id:' flatpak/io.github.pucas01.${BUILD_TARGET}.yml | awk '{print $2}')
          flatpak build-bundle flatpak-repo ${BUILD_TARGET}-linux-x64.flatpak ${APP_ID}

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_TARGET }}-linux-x64
          path: ${{ env.BUILD_TARGET }}-linux-x64.flatpak

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean "${env:BUILD_TARGET}.spec"

      - name: Verify Build
        run: |
          if (-not (Test-Path "dist/${env:BUILD_TARGET}.exe")) {
            Write-Error "dist/${env:BUILD_TARGET}.exe not found. Check your spec file output name."
            exit 1
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_TARGET }}-windows-x64
          path: dist/${{ env.BUILD_TARGET }}.exe


  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package for Release
        run: |
          TARGET=${{ env.BUILD_TARGET }}
          cp artifacts/${TARGET}-linux-x64/${TARGET}-linux-x64.flatpak .
          (cd artifacts/${TARGET}-windows-x64 && zip ../../${TARGET}-windows-x64.zip ${TARGET}.exe)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BUILD_TARGET }}-linux-x64.flatpak
            ${{ env.BUILD_TARGET }}-windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
