name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libxcb-xinerama0 libxkbcommon-x11-0 libgl1 \
            libxcb-icccm4 libxcb-render-util0 libxcb-keysyms1 \
            libxcb-shape0 libxcb-image0 libpulse-mainloop-glib0 \
            qtwayland5 libwayland-dev libwayland-egl1 \
            qml-module-qtgraphicaleffects libqt5svg5 \
            flatpak flatpak-builder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build with PyInstaller (Flatpak mode)
        run: |
          export XXAR_FLATPAK_BUILD=1
          pyinstaller --clean XXAR.spec

      - name: Verify PyInstaller Build
        run: |
          if [ ! -e dist/XXAR ]; then
            echo "Error: dist/XXAR not found. Check your spec file output name."
            exit 1
          fi
          chmod +x dist/XXAR

      - name: Set up Flatpak
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: |
          APP_ID=$(grep '^id:' flatpak/io.github.pucas01.XXAR.yml | awk '{print $2}')
          flatpak-builder --force-clean --repo=flatpak-repo build-dir flatpak/io.github.pucas01.XXAR.yml

      - name: Export Flatpak Bundle
        run: |
          APP_ID=$(grep '^id:' flatpak/io.github.pucas01.XXAR.yml | awk '{print $2}')
          flatpak build-bundle flatpak-repo XXAR-linux-x64.flatpak ${APP_ID}

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XXAR-linux-x64
          path: XXAR-linux-x64.flatpak

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean XXAR.spec

      - name: Verify Build
        run: |
          if (-not (Test-Path "dist/XXAR.exe")) {
            Write-Error "dist/XXAR.exe not found. Check your spec file output name."
            exit 1
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XXAR-windows-x64
          path: dist/XXAR.exe


  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package for Release
        run: |
          cp artifacts/XXAR-linux-x64/XXAR-linux-x64.flatpak .
          (cd artifacts/XXAR-windows-x64 && zip ../../XXAR-windows-x64.zip XXAR.exe)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            XXAR-linux-x64.flatpak
            XXAR-windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
